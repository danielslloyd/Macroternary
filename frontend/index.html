<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Macro Ternary</title>

    <!-- Tailwind via CDN (no build step). Fine for local sandbox; swap for a
         compiled stylesheet before deploying publicly. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { ink: "#1a1a1a", paper: "#fafaf7" },
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
          },
        },
      };
    </script>

    <!-- Import map so JS files can do `import * as d3 from "d3"`. -->
    <script type="importmap">
      {
        "imports": {
          "d3": "https://cdn.jsdelivr.net/npm/d3@7/+esm"
        }
      }
    </script>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-paper text-ink antialiased">
    <div id="app" class="flex flex-col h-screen">
      <header
        class="border-b border-gray-200 px-6 py-3 flex items-center justify-between shrink-0"
      >
        <div class="flex items-baseline gap-3">
          <h1 class="text-xl font-bold">Macro Ternary</h1>
          <span id="meta-summary" class="text-xs text-gray-500"></span>
        </div>
        <div class="flex items-center gap-2">
          <button
            id="manual-btn"
            class="px-3 py-1.5 text-sm border border-gray-300 rounded hover:bg-gray-50"
          >
            + Manual
          </button>
          <button
            id="ai-btn"
            class="px-3 py-1.5 text-sm border border-gray-300 rounded hover:bg-gray-50"
          >
            + AI
          </button>
        </div>
      </header>

      <div id="status-banner" class="hidden px-6 py-2 text-sm"></div>

      <div class="flex flex-1 overflow-hidden">
        <aside
          id="sidebar"
          class="w-64 p-4 border-r border-gray-200 overflow-y-auto shrink-0 space-y-6"
        ></aside>

        <main class="flex-1 overflow-auto p-6">
          <div class="max-w-3xl mx-auto">
            <div id="ternary-mount"></div>
            <p class="mt-2 text-xs text-gray-500">
              Click a point to inspect. Dashed lines are calorie cost per gram of protein
              (4 cal/g = pure protein, ∞ at the carb-fat base).
            </p>
          </div>
        </main>

        <aside
          id="detail"
          class="w-80 border-l border-gray-200 overflow-y-auto shrink-0"
        ></aside>
      </div>

      <footer
        class="border-t border-gray-200 px-6 py-2 text-xs text-gray-500 shrink-0"
      >
        <span id="footer-text"
          >Local sandbox · Macros from packaged labels and curated families.</span
        >
      </footer>
    </div>

    <div id="modal-root"></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
